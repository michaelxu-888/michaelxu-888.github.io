<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My NFC Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }
        .card {
            max-width: 400px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        a {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
        a:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>你的名字</h1>
    <p>你的简介（比如：Student / Maker）</p>

    <a href="https://instagram.com/你的账号">Instagram</a>
    <a href="https://tiktok.com/@你的账号">TikTok</a>
    <a href="https://wa.me/你的号码">WhatsApp</a>
    <a href="mailto:你的邮箱">Email</a>
</div>

</body>
</html>
