<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael's NFC Card</title>
    <style>
        /* 基础与动态渐变背景 */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f2027, #203a43);
            background-size: 400% 400%;
            color: white;
            text-align: center;
            overflow: hidden;
            /* 电影感：背景入场时从暗变亮，并轻微缩小（推拉感） */
            animation: gradientBG 15s ease infinite, cinematicCamera 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* 背景流动的关键帧 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 电影镜头推拉感关键帧 */
        @keyframes cinematicCamera {
            0% { 
                transform: scale(1.1); 
                filter: brightness(0.2) contrast(1.2); 
            }
            100% { 
                transform: scale(1); 
                filter: brightness(1) contrast(1); 
            }
        }

        /* 毛玻璃卡片设计 */
        .card {
            width: 85%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            /* 卡片本身的呼吸感悬浮 */
            animation: floating 6s ease-in-out infinite alternate;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        /* 逐行浮现的动画基础类 */
        .reveal-item {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            /* 使用 cubic-bezier 让动画曲线像弹簧一样自然 */
            animation: revealUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* 为每一行设置不同的延迟时间，形成瀑布流效果 */
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.7s; }
        .delay-4 { animation-delay: 0.9s; }
        .delay-5 { animation-delay: 1.1s; }

        @keyframes revealUp {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 名字与简介排版 */
        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .bio {
            color: #94a3b8;
            font-size: 15px;
            margin: 12px 0 35px 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* 按钮通用设计 */
        a {
            display: block;
            margin: 12px 0;
            padding: 16px;
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Instagram 专属渐变色 */
        .ig-btn {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        /* LinkedIn 专属颜色 */
        .in-btn {
            background: #0077b5;
        }

        /* 简历 专属颜色 (科技感深色+发光边框效果) */
        .cv-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        /* 悬停/点击交互效果 */
        a:hover {
            transform: translateY(-4px) scale(1.03);
        }
        
        .ig-btn:hover { box-shadow: 0 10px 25px rgba(220, 39, 67, 0.5); }
        .in-btn:hover { box-shadow: 0 10px 25px rgba(0, 119, 181, 0.5); }
        .cv-btn:hover { 
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2); 
        }

        a:active {
            transform: translateY(1px) scale(0.98);
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="reveal-item delay-1">XU BOTIAN</h1>
    <p class="bio reveal-item delay-2">Mechatronics Engineer | Temasek Poly Grad</p>

    <a href="https://www.instagram.com/michael_xu828/" target="_blank" class="ig-btn reveal-item delay-3">Instagram</a>
    
    <a href="https://www.linkedin.com/in/botian-xu-4337b9231/" target="_blank" class="in-btn reveal-item delay-4">LinkedIn</a>

    <a href="这里粘贴你的在线简历PDF链接" target="_blank" class="cv-btn reveal-item delay-5">📄 View My Resume</a>
</div>

</body>
</html>
