<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael's Social Name Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: #38bdf8;
            --secondary-glow: #818cf8;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505; 
            color: white;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* 影视级暗角 (Vignette) */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 40%, #000000 120%);
            pointer-events: none;
            z-index: 10;
        }

        /* 环境光晕 */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 10s infinite alternate ease-in-out;
            z-index: -1;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--primary-glow); top: 10%; left: 10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--secondary-glow); bottom: 10%; right: 10%; animation-delay: -5s; }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.2); }
        }

        /* 🌌 背景粒子流 Canvas */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 电影镜头推拉与迷焦 */
        .viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            animation: cinematicFocus 2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            z-index: 2;
        }

        @keyframes cinematicFocus {
            0% { transform: scale(1.15); filter: blur(12px) brightness(0); }
            100% { transform: scale(1); filter: blur(0) brightness(1); }
        }

        /* 包装器：处理原本的上下浮动，避免和 3D Tilt 冲突 */
        .floating-wrapper {
            width: 85%;
            max-width: 380px;
            animation: floating 6s ease-in-out infinite alternate;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        /* 极致毛玻璃卡片 (加入了 3D 悬浮的宿主) */
        .card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 40px 25px 30px 25px; /* 顶部多留一点空间给问候语 */
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            transform-style: preserve-3d; /* 开启 3D 子元素效果 */
        }

        /* 智能问候语 */
        .greeting {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            color: var(--primary-glow);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transform: translateZ(30px); /* 3D 悬浮在卡片上方 */
        }

        /* 问候语出现的动画 */
        .greeting.show {
            animation: greetFadeInOut 4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes greetFadeInOut {
            0% { opacity: 0; transform: translateZ(30px) translateY(10px); }
            15% { opacity: 1; transform: translateZ(30px) translateY(0); }
            80% { opacity: 1; transform: translateZ(30px) translateY(0); }
            100% { opacity: 0; transform: translateZ(30px) translateY(-10px); }
        }

        /* 头像/Logo */
        .avatar {
            width: 80px; 
            height: 80px;
            margin: 0 auto 12px auto; 
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            background: #1e293b; 
            display: block;
            transform: translateZ(40px); /* 让头像在 3D 倾斜时更突出 */
        }

        /* 名字与简介 */
        h1 {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            font-size: 30px; 
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255,255,255,0.1);
            transform: translateZ(20px);
        }

        .bio {
            font-family: 'Space Grotesk', sans-serif;
            color: #94a3b8;
            font-size: 13px; 
            margin: 6px 0 10px 0; 
            font-weight: 400;
            letter-spacing: 1.5px;
            min-height: 20px; /* 防止打字前高度塌陷 */
            transform: translateZ(20px);
        }

        /* 动态打字机光标 */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background-color: var(--primary-glow);
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 在线状态指示灯 */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            color: #a1a1aa;
            margin-bottom: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(15px);
        }

        .dot {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%;
            box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite;
        }

        /* 瀑布流动画类 */
        .reveal-item {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.7s; }
        .delay-5 { animation-delay: 0.8s; }
        .delay-6 { animation-delay: 0.9s; }
        .delay-7 { animation-delay: 1.0s; }
        .delay-8 { animation-delay: 1.1s; } 

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 按钮通用设计 */
        a {
            font-family: 'Montserrat', sans-serif;
            display: block; margin: 8px 0; padding: 13px;
            color: white; text-decoration: none; border-radius: 16px;
            font-weight: 700; font-size: 14px; letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden; z-index: 1;
            transform: translateZ(20px); /* 按钮在 3D 模式下悬浮 */
        }

        a::after {
            content: ''; position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); z-index: -1; transition: all 0.6s ease;
        }
        a:hover::after { left: 150%; }

        .contact-btn { background: linear-gradient(45deg, #8b5cf6, #d946ef); box-shadow: 0 4px 15px rgba(217, 70, 239, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); letter-spacing: 2px; }
        .ig-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); box-shadow: 0 4px 15px rgba(220, 39, 67, 0.2); }
        .wa-btn { background: linear-gradient(45deg, #128C7E, #25D366); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); }
        .tg-btn { background: linear-gradient(45deg, #0088cc, #2AABEE); box-shadow: 0 4px 15px rgba(0, 136, 204, 0.2); }
        .in-btn { background: #0077b5; box-shadow: 0 4px 15px rgba(0, 119, 181, 0.2); }
        .cv-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); }

        a:hover { transform: translateZ(30px) translateY(-3px) scale(1.02); }
        .contact-btn:hover { box-shadow: 0 10px 30px rgba(217, 70, 239, 0.6); }
        a:active { transform: translateZ(10px) translateY(1px) scale(0.98); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="viewport">
        <div class="floating-wrapper">
            <div class="card" data-tilt data-tilt-max="8" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.15">
                
                <div class="greeting" id="smart-greeting"></div>

                <img src="https://i.postimg.cc/cL7sNS42/6201781842143284779.jpg" alt="Michael Xu" class="avatar reveal-item delay-1">

                <h1 class="reveal-item delay-1">Michael Xu</h1>
                <p class="bio reveal-item delay-2"><span id="typewriter-text"></span><span class="cursor"></span></p>

                <div class="status reveal-item delay-2">
                    <span class="dot"></span> Online
                </div>

                <a href="./contact.vcf" class="contact-btn reveal-item delay-3">SAVE CONTACT</a>
                <a href="https://www.instagram.com/michael_xu828/" target="_blank" class="ig-btn reveal-item delay-4">INSTAGRAM</a>
                <a href="https://wa.me/6586089767" target="_blank" class="wa-btn reveal-item delay-5">WHATSAPP</a>
                <a href="https://t.me/michael828xu" target="_blank" class="tg-btn reveal-item delay-6">TELEGRAM</a>
                <a href="https://www.linkedin.com/in/botian-xu-4337b9231/" target="_blank" class="in-btn reveal-item delay-7">LINKEDIN</a>
                <a href="https://drive.google.com/file/d/1sG8a6GSy7HkzB0sjHuRIFqA5UyB1nK-O/view?usp=sharing" target="_blank" class="cv-btn reveal-item delay-8">VIEW RESUME</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

    <script>
        // --- 1. 智能问候语逻辑 ---
        document.addEventListener('DOMContentLoaded', () => {
            const hour = new Date().getHours();
            let greeting = "Good Evening";
            if (hour >= 5 && hour < 12) {
                greeting = "Good Morning";
            } else if (hour >= 12 && hour < 18) {
                greeting = "Good Afternoon";
            }
            
            const greetingEl = document.getElementById('smart-greeting');
            greetingEl.textContent = greeting;
            
            // 延迟 1 秒后显示（配合整体入场动画），然后会自动消失（CSS控制）
            setTimeout(() => {
                greetingEl.classList.add('show');
            }, 1000);
        });

        // --- 2. 动态打字机特效 ---
        const bioText = "Mechatronics Engineer | Temasek Poly";
        const typewriterEl = document.getElementById('typewriter-text');
        let typeIndex = 0;

        function typeWriter() {
            if (typeIndex < bioText.length) {
                typewriterEl.textContent += bioText.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeWriter, 40); // 打字速度，越小越快
            }
        }
        
        // 等待整个卡片滑入（约1.2秒）后再开始打字
        setTimeout(typeWriter, 1200);

        // --- 3. 微弱尘埃粒子流背景 ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5; // 粒子极小，增加克制感
                this.speedY = Math.random() * -0.5 - 0.2; // 缓慢向上漂浮
                this.opacity = Math.random() * 0.4; // 半透明
            }
            update() {
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000; // 根据屏幕大小决定粒子密度
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
    </script>
</body>
</html>
