<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael's NFC Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: #38bdf8;
            --secondary-glow: #818cf8;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505; 
            color: white;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* 影视级暗角 (Vignette) */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 40%, #000000 120%);
            pointer-events: none;
            z-index: 10;
        }

        /* 环境光晕 */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 10s infinite alternate ease-in-out;
            z-index: -1;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--primary-glow); top: 10%; left: 10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--secondary-glow); bottom: 10%; right: 10%; animation-delay: -5s; }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.2); }
        }

        /* 电影镜头推拉与迷焦 */
        .viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            animation: cinematicFocus 2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            z-index: 2;
        }

        @keyframes cinematicFocus {
            0% { transform: scale(1.15); filter: blur(12px) brightness(0); }
            100% { transform: scale(1); filter: blur(0) brightness(1); }
        }

        /* 极致毛玻璃卡片 */
        .card {
            width: 85%;
            max-width: 380px;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 45px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: floating 6s ease-in-out infinite alternate;
            position: relative;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        /* 头像/Logo 预留位 */
        .avatar {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            background-image: url('https://via.placeholder.com/90'); /* 此处替换你的头像链接 */
            background-size: cover;
            background-position: center;
        }

        /* 在线状态指示灯 */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            color: #a1a1aa;
            margin-bottom: 30px; /* 加大了这里的间距，因为去掉了技能标签 */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* 名字与简介 */
        h1 {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }

        .bio {
            font-family: 'Space Grotesk', sans-serif;
            color: #94a3b8;
            font-size: 14px;
            margin: 8px 0 25px 0;
            font-weight: 400;
            letter-spacing: 1.5px;
        }

        /* 瀑布流动画类 (细化了层级) */
        .reveal-item {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.7s; }
        .delay-5 { animation-delay: 0.8s; }
        .delay-6 { animation-delay: 0.9s; }
        .delay-7 { animation-delay: 1.0s; }

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 按钮通用设计与扫光特效 */
        a {
            font-family: 'Montserrat', sans-serif;
            display: block;
            margin: 12px 0;
            padding: 16px;
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        a::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            z-index: -1;
            transition: all 0.6s ease;
        }
        a:hover::after { left: 150%; }

        /* 各个按钮的专属涂装 */
        .ig-btn {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.2);
        }
        .wa-btn {
            background: linear-gradient(45deg, #128C7E, #25D366);
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }
        .tg-btn {
            background: linear-gradient(45deg, #0088cc, #2AABEE);
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.2);
        }
        .in-btn {
            background: #0077b5;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.2);
        }
        .cv-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        /* 悬停交互阴影发光 */
        a:hover { transform: translateY(-3px) scale(1.02); }
        .ig-btn:hover { box-shadow: 0 10px 30px rgba(220, 39, 67, 0.5); }
        .wa-btn:hover { box-shadow: 0 10px 30px rgba(37, 211, 102, 0.5); }
        .tg-btn:hover { box-shadow: 0 10px 30px rgba(0, 136, 204, 0.5); }
        .in-btn:hover { box-shadow: 0 10px 30px rgba(0, 119, 181, 0.5); }
        .cv-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1); }
        
        a:active { transform: translateY(1px) scale(0.98); }
    </style>
</head>
<body>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="viewport">
        <div class="card">
            
            <div class="avatar reveal-item delay-1"></div>

            <h1 class="reveal-item delay-1">XU BOTIAN</h1>
            <p class="bio reveal-item delay-2">Mechatronics Engineer | Temasek Poly</p>

            <div class="status reveal-item delay-2">
                <span class="dot"></span> Online
            </div>

            <a href="https://www.instagram.com/michael_xu828/" target="_blank" class="ig-btn reveal-item delay-3">INSTAGRAM</a>
            
            <a href="https://wa.me/+65 8608 9767" target="_blank" class="wa-btn reveal-item delay-4">WHATSAPP</a>
            
            <a href="https://t.me/+65 8608 9767" target="_blank" class="tg-btn reveal-item delay-5">TELEGRAM</a>
            
            <a href="https://www.linkedin.com/in/botian-xu-4337b9231/" target="_blank" class="in-btn reveal-item delay-6">LINKEDIN</a>

            <a href="https://drive.google.com/file/d/1sG8a6GSy7HkzB0sjHuRIFqA5UyB1nK-O/view?usp=sharing" target="_blank" class="cv-btn reveal-item delay-7">VIEW RESUME</a>
        </div>
    </div>

</body>
</html>
